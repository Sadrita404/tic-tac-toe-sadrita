<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cosmic Tic-Tac-Toe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --primary: #ff6fbf;
        --secondary: #d9a825;
        --dark: #3b1f3d;
        --light: #fff9f2;
        --x-color: #ff4d94;
        --o-color: #e3b800;
      }

      body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #fff8fb 0%, #fffdf3 100%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow-x: hidden;
      }

      .cell {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        cursor: pointer;
        transition: all 0.3s ease;
        background: #ffe2d8;
        border-radius: 12px;
        box-shadow: 0 10px 20px rgba(167, 86, 122, 0.18);
      }

      .cell:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 30px rgba(167, 86, 122, 0.22);
      }

      .cell.x::before, .cell.x::after, .cell.o::before {
        position: absolute;
        content: "";
        background-color: var(--x-color);
        width: 15px;
        height: 90px;
        border-radius: 10px;
      }

      .cell.x::before { transform: rotate(45deg); }
      .cell.x::after { transform: rotate(-45deg); }

      .cell.o::before {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        border: 15px solid var(--o-color);
        background-color: transparent;
      }

      .board {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-gap: 15px;
        width: 300px;
        height: 300px;
        margin: 20px auto;
      }

      .confetti {
        position: fixed;
        width: 10px;
        height: 10px;
        background-color: var(--secondary);
        opacity: 0;
        animation: confetti-fall 5s ease-out forwards;
        z-index: 1000;
      }

      @keyframes confetti-fall {
        0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
        100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
      }

      .modal {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background-color: rgba(59, 24, 57, 0.7);
        z-index: 100;
        justify-content: center;
        align-items: center;
      }

      .modal-content {
        background: var(--light);
        padding: 30px;
        border-radius: 15px;
        text-align: center;
        max-width: 400px;
        width: 90%;
        box-shadow: 0 20px 40px rgba(59, 24, 57, 0.15);
      }

      .player-turn {
        position: relative;
        display: inline-block;
        padding: 10px 20px;
        border-radius: 50px;
        font-weight: bold;
        color: white;
        box-shadow: 0 5px 15px rgba(59, 24, 57, 0.12);
        transition: all 0.3s ease;
        margin-bottom: 20px;
      }

      .player-x { background-color: var(--x-color); }
      .player-o { background-color: var(--o-color); }

      .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 50px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin: 5px;
        color: white;
      }

      .btn-primary { background-color: var(--primary); }
      .btn-primary:hover { background-color: #ff4a97; transform: translateY(-2px); }
      
      .btn-sm {
        padding: 6px 15px;
        font-size: 12px;
        background-color: #5f3d52;
      }

      .btn-selected {
        background-color: #3b1f3d !important;
        box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        border: 2px solid var(--primary);
      }

      .scoreboard {
        background: rgba(255, 255, 255, 0.78);
        border-radius: 15px;
        padding: 15px;
        margin-bottom: 15px;
        display: flex;
        justify-content: space-between;
        width: 300px;
      }

      .score-item { text-align: center; flex: 1; }
      .score-value { font-size: 24px; font-weight: bold; }
      .score-label { font-size: 12px; }

      .stars {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none;
        z-index: -1;
      }

      .star {
        position: absolute;
        background: white;
        border-radius: 50%;
        animation: twinkle 2s infinite alternate;
      }

      @keyframes twinkle { 0% { opacity: 0.2; } 100% { opacity: 1; } }

      .option-label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-weight: bold;
        color: var(--dark);
        margin-bottom: 5px;
      }
    </style>
  </head>
  <body>
    <div class="stars" id="stars"></div>

    <h1 class="text-3xl font-bold text-center mb-2 mt-4 text-indigo-800">Cosmic Tic-Tac-Toe</h1>
    
    <div class="flex flex-col items-center gap-2 mb-4">
      <div>
        <p class="option-label text-center">Game Mode</p>
        <button class="btn btn-primary btn-selected" id="mode-multiplayer">Multiplayer</button>
        <button class="btn btn-primary" id="mode-singleplayer">Single Player</button>
      </div>
      <div>
        <p class="option-label text-center">Who starts first?</p>
        <button class="btn btn-primary btn-selected" id="start-x">X Starts</button>
        <button class="btn btn-primary" id="start-o">O Starts</button>
      </div>
    </div>

    <div class="scoreboard">
      <div class="score-item text-pink-600">
        <div class="score-value" id="score-x">0</div>
        <div class="score-label">Player X</div>
      </div>
      <div class="score-item text-gray-500">
        <div class="score-value" id="score-tie">0</div>
        <div class="score-label">Ties</div>
      </div>
      <div class="score-item text-yellow-600">
        <div class="score-value" id="score-o">0</div>
        <div class="score-label">Player O</div>
      </div>
    </div>
    
    <button class="btn btn-sm mb-4" id="reset-score-btn">Reset Scoreboard</button>

    <div class="player-turn player-x" id="turn-indicator">Player X's Turn</div>

    <div class="board" id="board">
      <div class="cell" data-cell-index="0" data-cell></div>
      <div class="cell" data-cell-index="1" data-cell></div>
      <div class="cell" data-cell-index="2" data-cell></div>
      <div class="cell" data-cell-index="3" data-cell></div>
      <div class="cell" data-cell-index="4" data-cell></div>
      <div class="cell" data-cell-index="5" data-cell></div>
      <div class="cell" data-cell-index="6" data-cell></div>
      <div class="cell" data-cell-index="7" data-cell></div>
      <div class="cell" data-cell-index="8" data-cell></div>
    </div>

    <div class="flex justify-center mt-4">
      <button class="btn btn-primary" id="restart-btn">New Game</button>
    </div>

    <div class="modal" id="win-modal">
      <div class="modal-content">
        <h2 class="text-2xl font-bold mb-4" id="win-text">Player X Wins!</h2>
        <p class="mb-6 text-gray-700" id="win-message"></p>
        <button class="btn btn-primary" id="play-again-btn">Play Again</button>
      </div>
    </div>

    <div class="footer pb-4">Developed by Sadrita Neogi</div>
    
    <audio id="win-sound" src="fahhh_KcgAXfs.mp3" preload="auto"></audio>
    <audio id="click-sound" src="universfield-computer-mouse-click-352734.mp3" preload="auto"></audio>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        createStars();

        const cells = document.querySelectorAll("[data-cell]");
        const winModal = document.getElementById("win-modal");
        const winText = document.getElementById("win-text");
        const winMessage = document.getElementById("win-message");
        const winSound = document.getElementById("win-sound");
        const clickSound = document.getElementById("click-sound");
        const turnIndicator = document.getElementById("turn-indicator");
        
        const modeMultiplayerBtn = document.getElementById("mode-multiplayer");
        const modeSingleplayerBtn = document.getElementById("mode-singleplayer");
        const startXBtn = document.getElementById("start-x");
        const startOBtn = document.getElementById("start-o");

        const X_CLASS = "x";
        const O_CLASS = "o";
        const WINNING_COMBINATIONS = [
          [0, 1, 2], [3, 4, 5], [6, 7, 8],
          [0, 3, 6], [1, 4, 7], [2, 5, 8],
          [0, 4, 8], [2, 4, 6],
        ];

        let oTurn;
        let singlePlayerMode = false;
        let startingPlayer = "X"; // Default starting player
        let scores = { x: 0, o: 0, tie: 0 };

        startGame();

        // Mode and Starting Option Listeners
        modeMultiplayerBtn.addEventListener("click", () => {
          singlePlayerMode = false;
          toggleActive(modeMultiplayerBtn, modeSingleplayerBtn);
          startGame();
        });

        modeSingleplayerBtn.addEventListener("click", () => {
          singlePlayerMode = true;
          toggleActive(modeSingleplayerBtn, modeMultiplayerBtn);
          startGame();
        });

        startXBtn.addEventListener("click", () => {
          startingPlayer = "X";
          toggleActive(startXBtn, startOBtn);
          startGame();
        });

        startOBtn.addEventListener("click", () => {
          startingPlayer = "O";
          toggleActive(startOBtn, startXBtn);
          startGame();
        });

        function toggleActive(active, inactive) {
          active.classList.add("btn-selected");
          inactive.classList.remove("btn-selected");
        }

        function startGame() {
          // Initialize turn based on selection
          oTurn = (startingPlayer === "O");
          
          updateTurnIndicator();
          cells.forEach((cell) => {
            cell.classList.remove(X_CLASS, O_CLASS);
            cell.removeEventListener("click", handleClick);
            cell.addEventListener("click", handleClick, { once: true });
          });
          winModal.style.display = "none";
          playAudio(clickSound);

          // If single player and computer starts (O)
          if (singlePlayerMode && oTurn) {
            setTimeout(computerMove, 600);
          }
        }

        function handleClick(e) {
          const cell = e.target;
          const currentClass = oTurn ? O_CLASS : X_CLASS;
          placeMark(cell, currentClass);

          if (checkWin(currentClass)) {
            endGame(false);
          } else if (isDraw()) {
            endGame(true);
          } else {
            swapTurns();
            updateTurnIndicator();
            if (singlePlayerMode && oTurn) {
              setTimeout(computerMove, 400);
            }
          }
        }

        function computerMove() {
          const availableCells = [...cells].filter(cell => 
            !cell.classList.contains(X_CLASS) && !cell.classList.contains(O_CLASS)
          );
          if (availableCells.length > 0) {
            const bestCell = getBestMove(availableCells);
            bestCell.click();
          }
        }

        function getBestMove(availableCells) {
          const winCell = findWinningMove(O_CLASS, availableCells);
          if (winCell) return winCell;
          const blockCell = findWinningMove(X_CLASS, availableCells);
          if (blockCell) return blockCell;
          const centerCell = availableCells.find(c => c.dataset.cellIndex === "4");
          if (centerCell) return centerCell;
          return availableCells[Math.floor(Math.random() * availableCells.length)];
        }

        function findWinningMove(playerClass, availableCells) {
          return availableCells.find((cell) => {
            cell.classList.add(playerClass);
            const canWin = checkWin(playerClass);
            cell.classList.remove(playerClass);
            return canWin;
          });
        }

        function placeMark(cell, currentClass) { cell.classList.add(currentClass); }
        function swapTurns() { oTurn = !oTurn; }

        function updateTurnIndicator() {
          turnIndicator.textContent = oTurn ? 
            (singlePlayerMode ? "Computer's Turn" : "Player O's Turn") : "Player X's Turn";
          turnIndicator.className = oTurn ? "player-turn player-o" : "player-turn player-x";
        }

        function checkWin(currentClass) {
          return WINNING_COMBINATIONS.some(comb => 
            comb.every(index => cells[index].classList.contains(currentClass))
          );
        }

        function isDraw() {
          return [...cells].every(cell => cell.classList.contains(X_CLASS) || cell.classList.contains(O_CLASS));
        }

        function endGame(draw) {
          if (draw) {
            winText.textContent = "Game Drawn!";
            winMessage.textContent = "It was a cosmic standoff!";
            scores.tie++;
            document.getElementById("score-tie").textContent = scores.tie;
          } else {
            const winner = oTurn ? "O" : "X";
            winText.textContent = `Player ${winner} Wins!`;
            winMessage.textContent = `The stars have aligned for Player ${winner}!`;
            scores[winner.toLowerCase()]++;
            document.getElementById(`score-${winner.toLowerCase()}`).textContent = scores[winner.toLowerCase()];
            playAudio(winSound);
            createConfetti();
          }
          winModal.style.display = "flex";
        }

        function playAudio(soundElement) {
          if (!soundElement) return;
          soundElement.currentTime = 0;
          soundElement.play().catch(() => {});
        }

        document.getElementById("restart-btn").addEventListener("click", startGame);
        document.getElementById("play-again-btn").addEventListener("click", startGame);
        document.getElementById("reset-score-btn").addEventListener("click", () => {
          scores = { x: 0, o: 0, tie: 0 };
          document.getElementById("score-x").textContent = "0";
          document.getElementById("score-o").textContent = "0";
          document.getElementById("score-tie").textContent = "0";
        });

        function createStars() {
          const starsContainer = document.getElementById("stars");
          for (let i = 0; i < 100; i++) {
            const star = document.createElement("div");
            star.className = "star";
            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            star.style.width = `${Math.random() * 3}px`;
            star.style.height = star.style.width;
            star.style.animationDelay = `${Math.random() * 2}s`;
            starsContainer.appendChild(star);
          }
        }

        function createConfetti() {
          for (let i = 0; i < 100; i++) {
            const confetti = document.createElement("div");
            confetti.className = "confetti";
            confetti.style.left = `${Math.random() * 100}vw`;
            confetti.style.backgroundColor = ["#ff6fbf", "#ffd54f", "#ffb3d9", "#ffe066", "#ff4d94"][Math.floor(Math.random() * 5)];
            confetti.style.animationDuration = `${3 + Math.random() * 4}s`;
            document.body.appendChild(confetti);
            setTimeout(() => confetti.remove(), 5000);
          }
        }
      });
    </script>
  </body>
</html>
